<!DOCTYPE HTML>
<html>
	<head>
		<title>
			video tag in html
		</title>
		<style>
			.abc{
				height:300px; 
				width:350px;
			}
			.v{
				height:300px;
				width:200px;
			}
		</style>
	</head>
	<body>
		<video controls class="abc">
			<source src="../../vid/vid.mp4" type="video/mp4">
		</video>
		<video controls muted autoplay loop class="v">	
			<source src="../myvid.mp4.mp4" type="video/mp4">
		</video>
	</body>
</html>
